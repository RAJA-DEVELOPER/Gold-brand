<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Lost Treasure | Tanishq Fine Jewelry</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      background-color: var(--color-black);
      color: var(--color-ivory);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin: 0;
    }

    .error-container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
      position: relative;
      z-index: 10;
    }

    .error-code {
      font-family: var(--font-heading);
      font-size: 10rem;
      line-height: 1;
      color: var(--color-gold);
      opacity: 0.2;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
      letter-spacing: 0.2em;
    }

    .error-icon {
      font-size: 4rem;
      color: var(--color-gold);
      margin-bottom: 30px;
      filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5));
    }

    .error-title {
      font-family: var(--font-heading);
      font-size: 3rem;
      margin-bottom: 20px;
      color: #fff;
    }

    .error-text {
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 40px;
      line-height: 1.8;
    }

    .btn-group {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .bg-accent {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      z-index: -1;
      animation: pulse 8s infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.3; }
      100% { transform: scale(1.2); opacity: 0.6; }
    }

    /* --- Ultimate Responsive Pass for 404 --- */
    @media (max-width: 768px) {
      .error-code { font-size: 6rem !important; }
      .error-title { font-size: 2.2rem !important; }
      .error-container { padding: 20px !important; }
      .bg-accent { width: 300px !important; height: 300px !important; }
    }

    @media (max-width: 480px) {
      .error-code { font-size: 4rem !important; }
      .btn-group { flex-direction: column !important; gap: 15px !important; }
      .btn { width: 100% !important; justify-content: center !important; }
    }
  </style>
</head>
<body>

  <div class="bg-accent"></div>
  <div class="error-code">404</div>

  <div class="error-container reveal">
    <div class="error-icon">
      <i class="fa-solid fa-gem"></i>
    </div>
    <h1 class="error-title">Lost <em>Treasure</em></h1>
    <p class="error-text">Even the finest diamonds can sometimes go missing. The page you are looking for has either been moved or hidden within our private vaults.</p>
    
    <div class="btn-group">
      <a href="index.html" class="btn btn-primary">Return Home</a>
      <a href="products.html" class="btn btn-outline">Explore Collections</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
